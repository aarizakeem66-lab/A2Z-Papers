        rel="stylesheet">

    <style>
        :root {
            /* Dark Theme Colors */
            --bg-color: #0b1120;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-hover-bg: rgba(30, 41, 59, 0.7);
            --card-glow: rgba(56, 189, 248, 0.5);
            --primary-gradient: linear-gradient(135deg, #38bdf8, #818cf8);
            --loader-bg: #0b1120;
            --blob-1: rgba(56, 189, 248, 0.15);
            --blob-2: rgba(129, 140, 248, 0.15);
        }

        [data-theme="light"] {
            /* Light Theme Colors */
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --text-muted: #475569;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(0, 0, 0, 0.05);
            --card-hover-bg: rgba(255, 255, 255, 0.9);
            --card-glow: rgba(56, 189, 248, 0.3);
            --loader-bg: #f8fafc;
            --blob-1: rgba(56, 189, 248, 0.2);
            --blob-2: rgba(129, 140, 248, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Dynamic Background Blobs */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: var(--blob-1);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: var(--blob-2);
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(15%, 15%) scale(1.2);
            }
        }

        /* Header & Nav */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--primary-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--card-glow);
        }

        /* Main Layout */
        main {
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 1s ease forwards;
        }

        .hero-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            perspective: 1000px;
        }

        /* Glassmorphism Card */
        .category-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            cursor: pointer;
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, box-shadow;
        }

        .category-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
            pointer-events: none;
        }

        .category-card:hover::before {
            left: 150%;
        }

        .category-card:hover {
            background: var(--card-hover-bg);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px var(--card-glow);
        }

        /* Card Content */
        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: var(--primary-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title i.arrow {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .category-card:hover .card-title i.arrow {
            transform: translateX(10px);
            color: #38bdf8;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Loading Screen */
        .loader-wrapper {
            position: fixed;
            inset: 0;
            background: var(--loader-bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loader-wrapper.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--card-border);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        .loader-text {
            font-size: 1.2rem;
            font-weight: 500;
            background: var(--primary-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            header {
                padding: 1.5rem 5%;
            }
        }
    </style>
</head>

<body>

    <!-- Dynamic Background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Page Content -->
    <div id="page-content">
        <header>
            <div class="logo">A2Z Papers</div>
            <button class="theme-toggle" id="theme-btn" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <main>
            <div class="hero-section">
                <h1 class="hero-title">Model Papers Hub</h1>
                <p class="hero-subtitle">Access structured model papers for A/L students in Sri Lanka. Choose a category
                    below to explore available materials.</p>
            </div>

     crossorigin="anonymous"></script>

            <div class="cards-grid" id="cards-container">
                <!-- Cards injected via JS -->
            </div>
        </main>

    <!-- Loading Screen -->
    <div class="loader-wrapper" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Opening papers...</div>
    </div>

    <script>
        /**
         * A2Z Papers - Model Papers Navigation Architecture
         */
        const pageData = {
            categories: [
                {
                    title: "FWC Papers",
                    description: "Structured FWC Model Papers Collection",
                    pageLink: "fwc-papers.html",
                    icon: "fa-book-open"
                },
                {
                    title: "Moratuwa Papers",
                    description: "University-level & advanced model papers",
                    pageLink: "moratuwa-papers.html",
                    icon: "fa-graduation-cap"
                },
                {
                    title: "Provincial Papers",
                    description: "Provincial education board model papers",
                    pageLink: "provincial-papers.html",
                    icon: "fa-map-location-dot"
                },
                {
                    title: "Department Papers",
                    description: "Official Department examination papers",
                    pageLink: "department-papers.html",
                    icon: "fa-building-columns"
                }
            ],

            init() {
                this.renderCards();
                this.initThemeToggle();
                this.initAnimations();
            },

            renderCards() {
                const container = document.getElementById('cards-container');
                let html = '';

                this.categories.forEach((cat, index) => {
                    // Injecting structure
                    html += `
                        <div class="category-card" data-link="${cat.pageLink}" style="transition-delay: ${index * 100}ms">
                            <i class="fa-solid ${cat.icon} card-icon"></i>
                            <div class="card-title">
                                ${cat.title}
                                <i class="fa-solid fa-arrow-right arrow"></i>
                            </div>
                            <div class="card-desc">${cat.description}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                this.attachCardEvents();
            },

            attachCardEvents() {
                const cards = document.querySelectorAll('.category-card');

                cards.forEach(card => {
                    // Redirect Event
                    card.addEventListener('click', () => {
                        const link = card.getAttribute('data-link');
                        this.handleNavigation(link);
                    });

                    // Premium Tilt Effect (Vanilla JS)
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;

                        const centerX = rect.width / 2;
                        const centerY = rect.height / 2;

                        const rotateX = ((y - centerY) / centerY) * -5;
                        const rotateY = ((x - centerX) / centerX) * 5;

                        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                    });

                    card.addEventListener('mouseleave', () => {
                        card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                    });
                });
            },

            handleNavigation(link) {
                const pageContent = document.getElementById('page-content');
                const loader = document.getElementById('loader');

                // Step 1: Fade out page content
                pageContent.style.opacity = '0';
                pageContent.style.transform = 'translateY(-20px)';
                pageContent.style.pointerEvents = 'none';

                // Step 2: Show loading screen
                setTimeout(() => {
                    loader.classList.add('active');
                }, 300);

                // Step 3: Redirect
                setTimeout(() => {
                    window.location.href = link;
                }, 1200);
            },

            initThemeToggle() {
                const btn = document.getElementById('theme-btn');
                const icon = btn.querySelector('i');
                const html = document.documentElement;

                // Check localStorage
                const savedTheme = localStorage.getItem('a2z_theme') || 'dark';
                html.setAttribute('data-theme', savedTheme);
                updateIcon(savedTheme);

                btn.addEventListener('click', () => {
                    const currentTheme = html.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                    html.setAttribute('data-theme', newTheme);
                    localStorage.setItem('a2z_theme', newTheme);
                    updateIcon(newTheme);
                });

                function updateIcon(theme) {
                    if (theme === 'light') {
                        icon.className = 'fa-solid fa-sun';
                        icon.style.color = '#f59e0b';
                    } else {
                        icon.className = 'fa-solid fa-moon';
                        icon.style.color = '#f8fafc';
                    }
                }
            },

            initAnimations() {
                // Trigger scroll fade-in for cards
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.category-card').forEach(card => {
                    observer.observe(card);
                });
            }
        };

        // Initialize on DOM Load
        document.addEventListener('DOMContentLoaded', () => {
            pageData.init();
        });
    </script>
</body>

</html>
